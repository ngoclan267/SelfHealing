[pytest]
# ── Thư mục test ──────────────────────────────
testpaths = tests

# ── Output ────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# ── Timeout mỗi test (giây) ───────────────────
timeout = 120

# ── Markers ───────────────────────────────────
markers =
    login:      Login flow tests
    register:   Register flow tests
    products:   Product management tests
    admin:      Admin panel tests
    contact:    Contact form tests
    healing:    Self-healing locator tests
    smoke:      Quick sanity checks (subset of v1 cases)
    slow:       Tests that take > 30s

# ── Log ───────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S
