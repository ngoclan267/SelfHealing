        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      - name: Upload healing.db sau register
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healing-db-after-register
          path: |
            healing.db
            snapshots/
            knowledge_base/
          retention-days: 1

      - name: Upload reports register
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-register
          path: |
