name: Self-Healing Test Automation

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-self-healing-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: "true"
      BASE_URL: "http://localhost:5173"
      DISPLAY: ":99"                          # ← Xvfb display

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── FIX 1: FONT + XVFB ─────────────────────────────────────────
      - name: Install fonts and display server
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            xvfb \
            fonts-liberation \
            fonts-noto \
            fonts-noto-cjk \
            fonts-dejavu-core \
            fontconfig
          fc-cache -f -v
          echo "✅ Fonts installed"

      - name: Start Xvfb virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          sleep 2
          echo "✅ Xvfb started on :99"

      # ─── NODE + APP ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: myapp/package-lock.json

      - name: Install frontend dependencies
        working-directory: myapp
        run: npm ci

      - name: Start frontend dev server
        working-directory: myapp
        run: |
          npm run dev -- --port 5173 --host 0.0.0.0 &
          for i in $(seq 1 20); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Dev server is up!"
              break
            fi
            sleep 2
          done

      - name: Start backend API
        run: |
          npm install
          node backend/server.js &
          for i in $(seq 1 15); do
            if curl -s http://localhost:5000/api/products > /dev/null; then
              echo "Backend is up!"
              break
            fi
            sleep 2
          done
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      # ─── FIX 2: CHROME VỚI ĐÚNG FLAGS ───────────────────────────────
      - name: Setup Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Restore healing database from cache
        uses: actions/cache@v4
        with:
          path: |
            healing.db
            knowledge_base/
            snapshots/
          key: healing-db-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            healing-db-${{ runner.os }}-${{ github.ref_name }}-
            healing-db-${{ runner.os }}-

      - name: Show DB stats before run
        run: python scripts/db_stats.py
        continue-on-error: true

      - name: Check app health
        run: |
          echo "=== Frontend ==="
          curl -s http://localhost:5173 | grep -o "<title>.*</title>"
          echo "=== Backend API ==="
          curl -s http://localhost:5000/api/products | head -c 200
          echo "=== Test login API ==="
          curl -s -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@gmail.com","password":"password123"}'

      # ─── RUN TESTS QUA XVFB ──────────────────────────────────────────
      - name: Run self-healing tests
        run: |
          mkdir -p reports
          xvfb-run --server-args="-screen 0 1920x1080x24" \
          python -m pytest \
            backend/tests/test_login.py \
            backend/tests/test_products.py \
            backend/tests/test_register.py \
            backend/tests/test_contact.py \
            backend/tests/test_admin.py \
            -v -s \
            --tb=short \
            --junitxml=reports/test_results.xml \
            2>&1 | tee reports/test_output.log
        continue-on-error: true

      - name: Export healing.db to CSV
        if: always()
        run: |
          python - <<'EOF'
          import sqlite3, csv, os

          db_path = "healing.db"
          output_dir = "csv_exports"

          if not os.path.exists(db_path):
              print("❌ Không tìm thấy healing.db")
              exit(0)

          os.makedirs(output_dir, exist_ok=True)
          conn = sqlite3.connect(db_path)
          cursor = conn.cursor()

          cursor.execute("SELECT name FROM sqlite_master WHERE type='table'")
          tables = cursor.fetchall()
          print(f"✅ Tìm thấy {len(tables)} bảng")

          for (table_name,) in tables:
              cursor.execute(f"SELECT * FROM {table_name}")
              rows = cursor.fetchall()
              columns = [desc[0] for desc in cursor.description]

              with open(f"{output_dir}/{table_name}.csv", "w", newline="", encoding="utf-8") as f:
                  writer = csv.writer(f)
                  writer.writerow(columns)
                  writer.writerows(rows)

              print(f"  📄 {table_name}.csv — {len(rows)} dòng")

          conn.close()
          print("✅ Xuất CSV hoàn tất!")
          EOF

      - name: Upload CSV kết quả thực nghiệm
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ket-qua-thuc-nghiem-run-${{ github.run_number }}
          path: csv_exports/
          retention-days: 30

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-run-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Backup healing database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: healing-db-run-${{ github.run_number }}
          path: |
            healing.db
            knowledge_base/
            snapshots/
          retention-days: 90