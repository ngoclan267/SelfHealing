  # ══════════════════════════════════════════════════════════════
  # JOB 6: Tổng hợp report
  # ══════════════════════════════════════════════════════════════
  report:
    name: "Publish Test Report"
    runs-on: ubuntu-latest
    needs: [test-login, test-register, test-products, test-admin, test-contact]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-report-*
          path: all-reports/
          merge-multiple: false

      - name: Generate summary
        if: always()
        run: |
          echo "## 🧪 Self-Healing Selenium Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Flow: login → register → products → admin → contact" >> $GITHUB_STEP_SUMMARY
          echo "_healing.db được truyền tuần tự qua từng job, model tự train khi đủ 140 heal events_" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | UI Version | Loại | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|------|--------|" >> $GITHUB_STEP_SUMMARY

          for MODULE in login register products admin contact; do
            for VERSION in v1 v2 v3 v4 v5 v6 v7 v8 v9 v10 v11; do
              XML=$(find all-reports -name "junit-${MODULE}-${VERSION}.xml" 2>/dev/null | head -1)
              TYPE="Full suite"
              [ "$VERSION" != "v1" ] && TYPE="Healing"
              if [ -n "$XML" ]; then
                FAILURES=$(grep -oP 'failures="\K[0-9]+' "$XML" 2>/dev/null | head -1 || echo "0")
                ERRORS=$(grep -oP 'errors="\K[0-9]+' "$XML" 2>/dev/null | head -1 || echo "0")
                FAILURES=${FAILURES:-0}; ERRORS=${ERRORS:-0}
                if [ "$FAILURES" -eq 0 ] && [ "$ERRORS" -eq 0 ]; then
                  echo "| $MODULE | $VERSION | $TYPE | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
                else
                  echo "| $MODULE | $VERSION | $TYPE | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
                fi
              else
                echo "| $MODULE | $VERSION | $TYPE | ⚪ SKIP |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          done

      - name: Upload all reports
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports
          path: all-reports/
          retention-days: 14