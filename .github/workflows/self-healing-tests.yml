name: Self-Healing Selenium Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_module:
        description: "Module test (login/register/products/admin/contact, hoặc 'all')"
        required: false
        default: "all"

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  BASE_URL: "http://localhost:5173"
  BACKEND_PORT: "5000"

# ──────────────────────────────────────────────────────────────────────────────
# THIẾT KẾ:
#   Toàn bộ 5 module chạy TUẦN TỰ trên 1 runner duy nhất.
#
#   Trước mỗi module test, file page tương ứng được RESTORE về v1 từ
#   snapshots/v1/<PageName>.jsx để làm baseline cho self-healing.
#   Chỉ copy đúng page của module đó (LoginPage, RegisterPage, …),
#   các page còn lại giữ nguyên — Vite HMR tự reload, không cần restart.
#
#   Luồng mỗi module:
#     1. copy snapshots/v1/<Page>.jsx → myapp/src/pages/<Page>.jsx
#     2. chờ Vite HMR reload (3 s đủ với local dev server)
#     3. pytest test_<module>.py
#
#   healing.db tích lũy liên tục trên cùng 1 máy.
#   Model tự train khi DB đếm đủ 140 heal_success.
# ──────────────────────────────────────────────────────────────────────────────

# Ánh xạ module → file page v1 (snapshot baseline)
# Cấu trúc thư mục snapshot:
#   snapshots/
#   └── v1/
#       ├── Login.jsx          ← baseline của test_login.py
#       ├── Register.jsx       ← baseline của test_register.py
#       ├── Products.jsx       ← baseline của test_products.py
#       ├── Admin.jsx          ← baseline của test_admin.py
#       └── Contact.jsx        ← baseline của test_contact.py

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB DUY NHẤT: chạy tất cả 5 module tuần tự trên 1 runner
  # ════════════════════════════════════════════════════════════════
  run-all-tests:
    name: "Self-Healing Tests (login → register → products → admin → contact)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: myapp/package-lock.json
      - run: npm ci
        working-directory: myapp

      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: "6.0"

      - name: Start Backend server
        run: |
          npm install
          node server.js &
          timeout 30 bash -c 'until curl -sf http://localhost:5000 > /dev/null 2>&1; do sleep 2; done' || true
          echo "Backend ready!"

      - name: Start React dev server
        working-directory: myapp
        run: |
          npm run dev &
          timeout 60 bash -c 'until curl -sf http://localhost:5173 > /dev/null; do sleep 2; done'
          echo "React ready!"

      - name: Create output directories
        run: mkdir -p reports logs snapshots/v1 knowledge_base

      # ════════════════════════════════════════════════════════════
      # BƯỚC 1 — LOGIN
      # Restore snapshots/v1/Login.jsx → myapp/src/pages/Login.jsx
      # ════════════════════════════════════════════════════════════
      - name: "[1/5] Restore Login page → v1 snapshot"
        run: |
          SNAPSHOT="snapshots/v1/Login.jsx"
          TARGET="myapp/src/pages/Login.jsx"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "❌ Snapshot không tồn tại: $SNAPSHOT"
            echo "   Hãy đảm bảo file v1 đã được commit vào snapshots/v1/"
            exit 1
          fi
          cp "$SNAPSHOT" "$TARGET"
          echo "✅ Restored $SNAPSHOT → $TARGET"
          echo "   $(wc -l < $TARGET) dòng | $(date -u +%H:%M:%S) UTC"
          # Chờ Vite HMR pick up thay đổi
          sleep 3

      - name: "[1/5] test_login.py"
        run: |
          pytest tests/test_login.py \
            -v --tb=short \
            --junit-xml=reports/junit-login.xml \
            --html=reports/report-login.html \
            --self-contained-html \
            2>&1 | tee logs/login.log
          echo "--- heal_count sau login ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ════════════════════════════════════════════════════════════
      # BƯỚC 2 — REGISTER
      # Restore snapshots/v1/Register.jsx → myapp/src/pages/Register.jsx
      # ════════════════════════════════════════════════════════════
      - name: "[2/5] Restore Register page → v1 snapshot"
        run: |
          SNAPSHOT="snapshots/v1/Register.jsx"
          TARGET="myapp/src/pages/Register.jsx"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "❌ Snapshot không tồn tại: $SNAPSHOT"
            exit 1
          fi
          cp "$SNAPSHOT" "$TARGET"
          echo "✅ Restored $SNAPSHOT → $TARGET"
          echo "   $(wc -l < $TARGET) dòng | $(date -u +%H:%M:%S) UTC"
          sleep 3

      - name: "[2/5] test_register.py"
        run: |
          pytest tests/test_register.py \
            -v --tb=short \
            --junit-xml=reports/junit-register.xml \
            --html=reports/report-register.html \
            --self-contained-html \
            2>&1 | tee logs/register.log
          echo "--- heal_count sau register ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ════════════════════════════════════════════════════════════
      # BƯỚC 3 — PRODUCTS
      # Restore snapshots/v1/Products.jsx → myapp/src/pages/Products.jsx
      # ════════════════════════════════════════════════════════════
      - name: "[3/5] Restore Products page → v1 snapshot"
        run: |
          SNAPSHOT="snapshots/v1/Products.jsx"
          TARGET="myapp/src/pages/Products.jsx"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "❌ Snapshot không tồn tại: $SNAPSHOT"
            exit 1
          fi
          cp "$SNAPSHOT" "$TARGET"
          echo "✅ Restored $SNAPSHOT → $TARGET"
          echo "   $(wc -l < $TARGET) dòng | $(date -u +%H:%M:%S) UTC"
          sleep 3

      - name: "[3/5] test_products.py"
        run: |
          pytest tests/test_products.py \
            -v --tb=short \
            --junit-xml=reports/junit-products.xml \
            --html=reports/report-products.html \
            --self-contained-html \
            2>&1 | tee logs/products.log
          echo "--- heal_count sau products ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ════════════════════════════════════════════════════════════
      # BƯỚC 4 — ADMIN
      # Restore snapshots/v1/Admin.jsx → myapp/src/pages/Admin.jsx
      # ════════════════════════════════════════════════════════════
      - name: "[4/5] Restore Admin page → v1 snapshot"
        run: |
          SNAPSHOT="snapshots/v1/Admin.jsx"
          TARGET="myapp/src/pages/Admin.jsx"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "❌ Snapshot không tồn tại: $SNAPSHOT"
            exit 1
          fi
          cp "$SNAPSHOT" "$TARGET"
          echo "✅ Restored $SNAPSHOT → $TARGET"
          echo "   $(wc -l < $TARGET) dòng | $(date -u +%H:%M:%S) UTC"
          sleep 3

      - name: "[4/5] test_admin.py"
        run: |
          pytest tests/test_admin.py \
            -v --tb=short \
            --junit-xml=reports/junit-admin.xml \
            --html=reports/report-admin.html \
            --self-contained-html \
            2>&1 | tee logs/admin.log
          echo "--- heal_count sau admin ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ════════════════════════════════════════════════════════════
      # BƯỚC 5 — CONTACT
      # Restore snapshots/v1/Contact.jsx → myapp/src/pages/Contact.jsx
      # ════════════════════════════════════════════════════════════
      - name: "[5/5] Restore Contact page → v1 snapshot"
        run: |
          SNAPSHOT="snapshots/v1/Contact.jsx"
          TARGET="myapp/src/pages/Contact.jsx"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "❌ Snapshot không tồn tại: $SNAPSHOT"
            exit 1
          fi
          cp "$SNAPSHOT" "$TARGET"
          echo "✅ Restored $SNAPSHOT → $TARGET"
          echo "   $(wc -l < $TARGET) dòng | $(date -u +%H:%M:%S) UTC"
          sleep 3

      - name: "[5/5] test_contact.py"
        run: |
          pytest tests/test_contact.py \
            -v --tb=short \
            --junit-xml=reports/junit-contact.xml \
            --html=reports/report-contact.html \
            --self-contained-html \
            2>&1 | tee logs/contact.log
          echo "--- heal_count FINAL ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              total  = conn.execute("SELECT COUNT(*) FROM healing_events").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}  |  total events = {total}")
              if models > 0:
                  row = conn.execute("SELECT w_attribute, w_semantic, w_structure, w_visual, w_context, accuracy FROM learned_weights ORDER BY id DESC LIMIT 1").fetchone()
                  print(f"  Trọng số mới nhất: attr={row[0]:.3f} sem={row[1]:.3f} struct={row[2]:.3f} vis={row[3]:.3f} ctx={row[4]:.3f} (acc={row[5]:.1%})")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload healing.db + knowledge_base
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healing-db-final
          path: |
            healing.db
            snapshots/
            knowledge_base/
          retention-days: 14

      - name: Upload test reports + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            logs/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════
  # JOB 2: Publish summary lên GitHub Actions UI
  # ════════════════════════════════════════════════════════════════
  report:
    name: "Publish Test Report"
    runs-on: ubuntu-latest
    needs: run-all-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: reports/

      - name: Download healing.db
        uses: actions/download-artifact@v4
        with:
          name: healing-db-final
          path: .
        continue-on-error: true

      - name: Generate summary
        if: always()
        run: |
          python - <<'EOF'
          import os, sqlite3, glob, re

          summary = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')

          lines = []
          lines.append("## 🧪 Self-Healing Selenium Test Results\n")
          lines.append("### Luồng chạy: login → register → products → admin → contact\n")
          lines.append("_Mỗi module restore page v1 từ snapshots/v1/ trước khi chạy — Vite HMR tự reload_\n\n")

          # Đọc DB stats
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              total  = conn.execute("SELECT COUNT(*) FROM healing_events").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              conn.close()

              lines.append("### 📊 Healing Database (kết thúc pipeline)\n\n")
              lines.append("| Chỉ số | Giá trị |\n|--------|--------|\n")
              lines.append(f"| Tổng heal events | {total} |\n")
              lines.append(f"| heal_success tích lũy | **{heal}** |\n")
              lines.append(f"| Ngưỡng train lần đầu | 140 |\n")
              lines.append(f"| Số lần model đã train | {models} |\n")
              if models > 0:
                  lines.append(f"| Trạng thái model | ✅ Đã train, dùng LEARNED weights |\n")
              else:
                  lines.append(f"| Trạng thái model | ⏳ Còn thiếu {max(0, 140-heal)} heal_success |\n")
              lines.append("\n")
          except Exception as e:
              lines.append(f"_(Không đọc được healing.db: {e})_\n\n")

          # Kết quả từng module
          lines.append("### 📋 Kết quả từng module\n\n")
          lines.append("| Module | Snapshot v1 | Tổng cases | Passed | Failed | Status |\n")
          lines.append("|--------|------------|-----------|--------|--------|--------|\n")

          snapshots = {
              "login":    "Login.jsx",
              "register": "Register.jsx",
              "products": "Products.jsx",
              "admin":    "Admin.jsx",
              "contact":  "Contact.jsx",
          }

          for module in ["login", "register", "products", "admin", "contact"]:
              snap = snapshots[module]
              xml_files = glob.glob(f"reports/junit-{module}.xml")
              if not xml_files:
                  lines.append(f"| {module} | `{snap}` | — | — | — | ⚪ SKIP |\n")
                  continue
              content = open(xml_files[0]).read()
              tests    = re.search(r'tests="(\d+)"',    content)
              failures = re.search(r'failures="(\d+)"', content)
              errors   = re.search(r'errors="(\d+)"',   content)
              t = int(tests.group(1))    if tests    else 0
              f = int(failures.group(1)) if failures else 0
              e = int(errors.group(1))   if errors   else 0
              passed = t - f - e
              status = "✅ PASS" if (f + e) == 0 else f"❌ FAIL"
              lines.append(f"| {module} | `{snap}` | {t} | {passed} | {f+e} | {status} |\n")

          with open(summary, 'a') as fp:
              fp.writelines(lines)

          print("Summary generated.")
          EOF

      - name: Upload combined reports
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports
          path: reports/
          retention-days: 14