name: Self-Healing Test Automation

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-self-healing-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: "true"
      # BASE_URL dùng cho toàn bộ test — app chạy trên cổng 5173
      BASE_URL: "http://localhost:5173"

    steps:
      # ─── 1. CHECKOUT ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. PYTHON ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── 3. NODE + KHỞI ĐỘNG APP ────────────────────────────────────
      # App React/Vite cần chạy trước khi test Selenium kết nối vào
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: myapp/package-lock.json

      - name: Install frontend dependencies
        working-directory: myapp
        run: npm ci

      - name: Build and serve frontend
        working-directory: myapp
        run: |
          npm run build
          npx serve -s dist -l 5173 --single &
          echo "Waiting for static server..."
          for i in $(seq 1 15); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Static server is up!"
              break
            fi
            sleep 2
          done
      # ─── 4. BACKEND Node.js ─────────────────────────────────────────
      - name: Start backend API
        run: |
          npm install
          node backend/server.js &
          for i in $(seq 1 15); do
            if curl -s http://localhost:5000/api/products > /dev/null; then
              echo "Backend is up!"
              break
            fi
            sleep 2
          done
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
      # ─── 5. CHROME ──────────────────────────────────────────────────
      - name: Setup Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ─── 6. RESTORE healing.db ──────────────────────────────────────
      - name: Restore healing database from cache
        uses: actions/cache@v4
        with:
          path: |
            healing.db
            knowledge_base/
            snapshots/
          key: healing-db-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            healing-db-${{ runner.os }}-${{ github.ref_name }}-
            healing-db-${{ runner.os }}-

      # ─── 7. THỐNG KÊ DB TRƯỚC KHI CHẠY ─────────────────────────────
      - name: Show DB stats before run
        run: python scripts/db_stats.py
        continue-on-error: true
      - name: Check app health
        run: |
          echo "=== Frontend ==="
          curl -s http://localhost:5173 | grep -o "<title>.*</title>"
          
          echo "=== Backend API ==="
          curl -s http://localhost:5000/api/products | head -c 200
          
          echo "=== Test login API ==="
          curl -s -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@gmail.com","password":"password123"}'
      # ─── 8. CHẠY TESTS ──────────────────────────────────────────────
      # Chạy đúng thứ tự: products → register → contact → admin
      # _maybe_retrain_model() tự kích hoạt bên trong khi đủ 140 heals
      - name: Run self-healing tests
        run: |
          mkdir -p reports
          python -m pytest \
            backend/tests/test_login.py \
            backend/tests/test_products.py \
            backend/tests/test_register.py \
            backend/tests/test_contact.py \
            backend/tests/test_admin.py \
            -v -s \
            --tb=short \
            --junitxml=reports/test_results.xml \
            2>&1 | tee reports/test_output.log
        continue-on-error: true
      # ─── 10. UPLOAD REPORTS ─────────────────────────────────────────
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-run-${{ github.run_number }}
          path: reports/
          retention-days: 30

      # ─── 11. BACKUP healing.db ──────────────────────────────────────
      - name: Backup healing database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: healing-db-run-${{ github.run_number }}
          path: |
            healing.db
            knowledge_base/
            snapshots/
          retention-days: 90
