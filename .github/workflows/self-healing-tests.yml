name: Self-Healing Selenium Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_module:
        description: "Module test (login/register/products/admin/contact/self_healing, hoặc 'all')"
        required: false
        default: "all"

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  BASE_URL: "http://localhost:5173"
  BACKEND_PORT: "5000"

# Script dùng chung để chạy 1 file test qua v1→v11 tuần tự
# Mỗi version: switch UI → chạy test → lưu healing.db

jobs:
  # ══════════════════════════════════════════════════════════════
  # JOB 1: test_login.py — v1→v11 tuần tự
  # ══════════════════════════════════════════════════════════════
  test-login:
    name: "test_login.py (v1→v11)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: myapp/package-lock.json
      - run: npm ci
        working-directory: myapp

      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: '6.0'

      - name: Start Backend server
        run: |
          npm install
          node server.js &
          timeout 30 bash -c 'until curl -sf http://localhost:5000 > /dev/null 2>&1; do sleep 2; done' || true
          echo "Backend ready!"

      - name: Start React dev server
        working-directory: myapp
        run: |
          npm run dev &
          timeout 60 bash -c 'until curl -sf http://localhost:5173 > /dev/null; do sleep 2; done'
          echo "React ready!"

      - name: Create output directories
        run: mkdir -p reports logs snapshots knowledge_base

      # ── Chạy v1 trước — tạo snapshot ──────────────
      - name: "[login] v1 — tạo snapshot"
        run: |
          bash myapp/src_mutated/switch_ui.sh v1
          pytest tests/test_login.py \
            -v --tb=short \
            --junit-xml=reports/junit-login-v1.xml \
            --html=reports/report-login-v1.html \
            --self-contained-html \
            2>&1 | tee logs/login-v1.log
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ── v2→v11 tuần tự — heal + tích lũy DB ───────
      - name: "[login] v2→v11 — heal tuần tự"
        run: |
          for VERSION in v2 v3 v4 v5 v6 v7 v8 v9 v10 v11; do
            echo "════════════════════════════════"
            echo " Chạy test_login.py với UI $VERSION"
            echo "════════════════════════════════"
            bash myapp/src_mutated/switch_ui.sh $VERSION
            pytest tests/test_login.py \
              -v --tb=short \
              --junit-xml=reports/junit-login-$VERSION.xml \
              --html=reports/report-login-$VERSION.html \
              --self-contained-html \
              -k "Healing" \
              2>&1 | tee logs/login-$VERSION.log
            echo "Done $VERSION — DB events:"
            python -c "
          import sqlite3
          conn = sqlite3.connect('healing.db')
          total = conn.execute('SELECT COUNT(*) FROM healing_events WHERE healing_success=1').fetchone()[0]
          weights = conn.execute('SELECT COUNT(*) FROM learned_weights').fetchone()[0]
          print(f'  heal_success={total}, model_versions={weights}')
          conn.close()
            " 2>/dev/null || true
          done
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      - name: Upload healing.db sau login
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healing-db-after-login
          path: |
            healing.db
            snapshots/
            knowledge_base/
          retention-days: 1

      - name: Upload reports login
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-login
          path: |
            reports/
            logs/
          retention-days: 14

  # ══════════════════════════════════════════════════════════════
  # JOB 2: test_register.py — download DB từ job 1, tiếp tục tích lũy
  # ══════════════════════════════════════════════════════════════
