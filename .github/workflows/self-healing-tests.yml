name: Self-Healing Test Automation

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-self-healing-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ─── 1. CHECKOUT ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. PYTHON ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── 3. CHROME HEADLESS ─────────────────────────────────────────
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ─── 4. RESTORE healing.db TỪ CACHE ────────────────────────────
      # Đây là bước then chốt: SQLite phải được giữ lại giữa các lần chạy.
      # GitHub Actions cache dùng key theo ngày → mỗi ngày tạo cache mới
      # nhưng vẫn restore từ ngày hôm trước nếu ngày hôm nay chưa có.
      - name: Restore healing database from cache
        uses: actions/cache@v4
        with:
          path: |
            healing.db
            knowledge_base/
          key: healing-db-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('healing.db') }}
          restore-keys: |
            healing-db-${{ runner.os }}-${{ github.ref_name }}-
            healing-db-${{ runner.os }}-

      # ─── 5. IN TRẠNG THÁI DB TRƯỚC KHI CHẠY ────────────────────────
      - name: Show DB state before run
        run: python scripts/db_stats.py
        continue-on-error: true

      # ─── 6. CHẠY 4 FILE TEST THEO THỨ TỰ ───────────────────────────
      # _maybe_retrain_model() được gọi tự động bên trong Healing_driver_v2
      # sau mỗi heal thành công. Không cần làm gì thêm ở đây.
      - name: Run self-healing tests
        run: |
          mkdir -p reports
          python -m pytest \
            tests/test_products.py \
            tests/test_register.py \
            tests/test_contact.py \
            tests/test_admin.py \
            -v -s \
            --tb=short \
            --junitxml=reports/test_results.xml \
            --log-cli-level=INFO \
            2>&1 | tee reports/test_output.log
        continue-on-error: true
        env:
          APP_URL: ${{ secrets.APP_URL }}
          # Bảo Selenium dùng Chrome headless
          CI: "true"

      # ─── 7. IN TRẠNG THÁI DB SAU KHI CHẠY ──────────────────────────
      - name: Show DB state after run
        if: always()
        run: python scripts/db_stats.py
        continue-on-error: true

      # ─── 8. LƯU REPORTS ─────────────────────────────────────────────
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

      # ─── 9. BACKUP healing.db LÊN ARTIFACTS ─────────────────────────
      # Để có thể download về xem hoặc restore thủ công nếu cần
      - name: Backup healing database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: healing-db-run-${{ github.run_number }}
          path: |
            healing.db
            knowledge_base/
          retention-days: 90
