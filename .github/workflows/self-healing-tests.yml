name: Self-Healing Test Suite

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'backend/**'
      - 'myapp/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Chạy file test cụ thể (để trống = chạy tất cả)'
        required: false
        default: ''
      ui_version:
        description: 'UI version để test (v1..v11, để trống = tất cả)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  HEADLESS: 'true'
  BACKEND_DIR: backend
  DB_PATH: backend/healing.db
  FIRST_TRAIN_THRESHOLD: 140
  RETRAIN_EVERY: 20

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Cài đặt dependencies và cache
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate cache key
        id: cache-key
        run: echo "key=pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt', 'backend/requirements.txt') }}" >> $GITHUB_OUTPUT

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            pip-${{ env.PYTHON_VERSION }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Verify installations
        run: |
          python -c "import selenium; print('selenium:', selenium.__version__)"
          python -c "import sklearn; print('sklearn:', sklearn.__version__)"
          python -c "import numpy; print('numpy:', numpy.__version__)"
          python -c "import pytest; print('pytest:', pytest.__version__)"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Khởi động services (Frontend + Backend)
  # ─────────────────────────────────────────────────────────────────────────────
  start-services:
    name: Start App Services
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      backend-ready: ${{ steps.check-backend.outputs.ready }}
      frontend-ready: ${{ steps.check-frontend.outputs.ready }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'myapp/package-lock.json'

      - name: Install frontend dependencies
        working-directory: myapp
        run: npm ci

      - name: Start Frontend (Vite dev server)
        working-directory: myapp
        run: |
          npm run dev &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for Frontend to be ready
        id: check-frontend
        run: |
          echo "Waiting for frontend on port 5173..."
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready!"
              echo "ready=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  Attempt $i/30..."
            sleep 2
          done
          echo "Frontend failed to start"
          echo "ready=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Setup Python for backend
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Start Backend (Express/Node)
        working-directory: backend
        run: |
          npm ci
          node server.js &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
        env:
          PORT: 5000

      - name: Wait for Backend to be ready
        id: check-backend
        run: |
          echo "Waiting for backend on port 5000..."
          for i in {1..30}; do
            if curl -s http://localhost:5000/health > /dev/null 2>&1 || \
               curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "Backend is ready!"
              echo "ready=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  Attempt $i/30..."
            sleep 2
          done
          echo "Backend failed to start"
          echo "ready=false" >> $GITHUB_OUTPUT
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Chạy từng file test riêng biệt (matrix strategy)
  # ─────────────────────────────────────────────────────────────────────────────
  run-tests:
    name: Test - ${{ matrix.test_module }}
    runs-on: ubuntu-latest
    needs: [setup, start-services]
    strategy:
      fail-fast: false   # Tiếp tục chạy các file khác dù 1 file fail
      matrix:
        test_module:
          - test_login
          - test_register
          - test_products
          - test_admin
          - test_contact
          - test_self_healing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start Frontend
        working-directory: myapp
        run: |
          npm ci
          npm run dev &
          sleep 5

      - name: Start Backend
        working-directory: backend
        run: |
          npm ci
          node server.js &
          sleep 5
        env:
          PORT: 5000

      - name: Setup ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Restore healing.db (nếu có artifact từ run trước)
        uses: actions/download-artifact@v4
        with:
          name: healing-db
          path: backend/
        continue-on-error: true   # Lần đầu chạy chưa có DB → bỏ qua

      - name: Run ${{ matrix.test_module }}
        working-directory: backend
        run: |
          # Chạy file test cụ thể theo matrix
          python -m pytest tests/${{ matrix.test_module }}.py \
            -v \
            --timeout=120 \
            --tb=short \
            --junitxml=reports/junit_${{ matrix.test_module }}.xml \
            --html=reports/report_${{ matrix.test_module }}.html \
            --self-contained-html \
            -p no:warnings
        env:
          HEADLESS: 'true'
          PYTHONPATH: '.'
          DB_PATH: healing.db

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.test_module }}-${{ github.run_number }}
          path: |
            backend/reports/junit_${{ matrix.test_module }}.xml
            backend/reports/report_${{ matrix.test_module }}.html
          retention-days: 30

      - name: Upload healing.db (sau mỗi test)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healing-db-${{ matrix.test_module }}
          path: backend/healing.db
          retention-days: 7
          overwrite: true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Merge DB và kiểm tra ngưỡng train/retrain
  # ─────────────────────────────────────────────────────────────────────────────
  check-train-trigger:
    name: Check Train / Retrain Trigger
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    outputs:
      should-train: ${{ steps.check.outputs.should_train }}
      train-type: ${{ steps.check.outputs.train_type }}
      heal-count: ${{ steps.check.outputs.heal_count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Download all healing DBs
        uses: actions/download-artifact@v4
        with:
          pattern: healing-db-*
          path: /tmp/dbs/
          merge-multiple: false
        continue-on-error: true

      - name: Merge healing DBs
        run: |
          python scripts/merge_healing_dbs.py \
            --input-dir /tmp/dbs \
            --output backend/healing.db \
            --base-db backend/healing.db
        continue-on-error: true

      - name: Check heal event count & train trigger
        id: check
        working-directory: backend
        run: |
          python - <<'PYEOF'
          import sqlite3, os, sys

          db_path = "healing.db"
          FIRST_TRAIN = 140
          RETRAIN_EVERY = 20

          if not os.path.exists(db_path):
              print("DB không tồn tại, chưa có heal event nào")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("should_train=false\n")
                  f.write("train_type=none\n")
                  f.write("heal_count=0\n")
              sys.exit(0)

          conn = sqlite3.connect(db_path)
          # Đếm tổng heal thành công
          total = conn.execute(
              "SELECT COUNT(*) FROM healing_events WHERE healing_success=1"
          ).fetchone()[0]

          # Đếm số lần đã train
          try:
              history = conn.execute(
                  "SELECT COUNT(*) FROM learned_weights"
              ).fetchone()[0]
          except:
              history = 0

          conn.close()

          print(f"Total heal success: {total}")
          print(f"Train history count: {history}")
          print(f"FIRST_TRAIN threshold: {FIRST_TRAIN}")
          print(f"RETRAIN_EVERY: {RETRAIN_EVERY}")

          should_train = False
          train_type = "none"

          if total < FIRST_TRAIN:
              print(f"Chưa đủ {FIRST_TRAIN} heal events (hiện có {total})")
          else:
              should_have_trained = 1 + (total - FIRST_TRAIN) // RETRAIN_EVERY
              print(f"should_have_trained: {should_have_trained} | history: {history}")

              if should_have_trained > history:
                  should_train = True
                  if history == 0:
                      train_type = "first_train"
                      print(f">>> TRIGGER: Train lần đầu (đủ {FIRST_TRAIN} heal events)")
                  else:
                      train_type = "retrain"
                      print(f">>> TRIGGER: Retrain lần #{history+1} (total={total})")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_train={'true' if should_train else 'false'}\n")
              f.write(f"train_type={train_type}\n")
              f.write(f"heal_count={total}\n")
          PYEOF

      - name: Save merged DB
        uses: actions/upload-artifact@v4
        with:
          name: healing-db
          path: backend/healing.db
          retention-days: 90
          overwrite: true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5: Train / Retrain model (chỉ chạy khi đạt ngưỡng)
  # ─────────────────────────────────────────────────────────────────────────────
  train-model:
    name: "Train Model (${{ needs.check-train-trigger.outputs.train-type }})"
    runs-on: ubuntu-latest
    needs: check-train-trigger
    if: needs.check-train-trigger.outputs.should-train == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Download latest healing.db
        uses: actions/download-artifact@v4
        with:
          name: healing-db
          path: backend/

      - name: Run Train / Retrain
        id: train
        working-directory: backend
        run: |
          echo "=== Train type: ${{ needs.check-train-trigger.outputs.train-type }} ==="
          echo "=== Heal count: ${{ needs.check-train-trigger.outputs.heal-count }} ==="

          python - <<'PYEOF'
          import sys
          sys.path.insert(0, ".")
          from core.Logistic_weight_model import LogisticWeightModel

          model = LogisticWeightModel(db_path="healing.db")
          print("Bắt đầu training...")
          result = model.retrain()

          if result:
              print("Training thành công!")
              print("New weights:")
              for k, v in result.items():
                  print(f"  {k}: {v:.4f}")
          else:
              print("Training thất bại hoặc chưa đủ data")
              sys.exit(1)
          PYEOF

      - name: Export new weights to JSON
        working-directory: backend
        run: |
          python - <<'PYEOF'
          import sqlite3, json, os

          conn = sqlite3.connect("healing.db")
          row = conn.execute("""
              SELECT w_attribute, w_semantic, w_structure, w_visual, w_context,
                     n_samples, accuracy, trained_at, notes
              FROM learned_weights
              ORDER BY id DESC LIMIT 1
          """).fetchone()
          conn.close()

          if row:
              weights = {
                  "attribute": row[0], "semantic": row[1],
                  "structure": row[2], "visual": row[3], "context": row[4],
                  "n_samples": row[5], "accuracy": row[6],
                  "trained_at": row[7], "notes": row[8],
                  "train_type": "${{ needs.check-train-trigger.outputs.train-type }}",
                  "heal_count": ${{ needs.check-train-trigger.outputs.heal-count }},
              }
              os.makedirs("reports", exist_ok=True)
              with open("reports/latest_weights.json", "w") as f:
                  json.dump(weights, f, indent=2, ensure_ascii=False)
              print(json.dumps(weights, indent=2, ensure_ascii=False))
          PYEOF

      - name: Upload trained DB + weights
        uses: actions/upload-artifact@v4
        with:
          name: healing-db
          path: |
            backend/healing.db
            backend/reports/latest_weights.json
          retention-days: 90
          overwrite: true

      - name: Summary
        run: |
          echo "## 🤖 Model Training Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ needs.check-train-trigger.outputs.train-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Heal events used**: ${{ needs.check-train-trigger.outputs.heal-count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run**: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ -f backend/reports/latest_weights.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### New Weights" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat backend/reports/latest_weights.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 6: Tổng hợp kết quả & tạo summary
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [run-tests, check-train-trigger, train-model]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: /tmp/reports/
          merge-multiple: true
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lxml for JUnit parsing
        run: pip install lxml

      - name: Generate Summary
        run: |
          python - <<'PYEOF'
          import os, glob
          from xml.etree import ElementTree as ET

          reports_dir = "/tmp/reports"
          xml_files = glob.glob(f"{reports_dir}/**/*.xml", recursive=True)

          total_tests = total_pass = total_fail = total_error = 0
          results = []

          for f in sorted(xml_files):
              try:
                  tree = ET.parse(f)
                  root = tree.getroot()
                  suite = root if root.tag == 'testsuite' else root.find('testsuite')
                  if suite is None:
                      continue
                  t = int(suite.get('tests', 0))
                  fail = int(suite.get('failures', 0))
                  err = int(suite.get('errors', 0))
                  skip = int(suite.get('skipped', 0))
                  passed = t - fail - err - skip
                  name = os.path.basename(f).replace('junit_', '').replace('.xml', '')
                  results.append((name, t, passed, fail + err))
                  total_tests += t
                  total_pass += passed
                  total_fail += fail + err
              except Exception as e:
                  print(f"Error parsing {f}: {e}")

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary, "a") as f:
              f.write("## 📊 Test Results Summary\n\n")
              f.write(f"| Module | Total | ✅ Pass | ❌ Fail |\n")
              f.write(f"|--------|-------|---------|--------|\n")
              for name, t, p, fail in results:
                  icon = "✅" if fail == 0 else "❌"
                  f.write(f"| {icon} `{name}` | {t} | {p} | {fail} |\n")
              f.write(f"\n**Total**: {total_tests} tests | ✅ {total_pass} passed | ❌ {total_fail} failed\n\n")

              heal_count = "${{ needs.check-train-trigger.outputs.heal-count }}"
              train_type = "${{ needs.check-train-trigger.outputs.train-type }}"
              should_train = "${{ needs.check-train-trigger.outputs.should-train }}"

              f.write("## 🔧 Self-Healing Status\n\n")
              f.write(f"- **Total heal events**: {heal_count}\n")
              f.write(f"- **Train triggered**: {'Yes - ' + train_type if should_train == 'true' else 'No'}\n")
              f.write(f"- **First train threshold**: 140 heal events\n")
              f.write(f"- **Retrain every**: 20 heal events\n")
          PYEOF

      - name: Final status
        run: |
          echo "Pipeline completed. Check summary for details."