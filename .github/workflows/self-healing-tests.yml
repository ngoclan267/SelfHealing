name: Self-Healing Selenium Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_module:
        description: "Module test (login/register/products/admin/contact, hoặc 'all')"
        required: false
        default: "all"

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  BASE_URL: "http://localhost:5173"
  BACKEND_PORT: "5000"

# ──────────────────────────────────────────────────────────────────────────────
# THIẾT KẾ:
#   Toàn bộ 5 module chạy TUẦN TỰ trên 1 runner duy nhất — giống hệt terminal:
#     pytest test_login.py test_register.py test_products.py test_admin.py test_contact.py
#
#   Trước mỗi module: switch_ui.sh v1 → đảm bảo snapshot v1 luôn sạch,
#   tránh ảnh hưởng chéo giữa các module khi healing chạy v2→v11.
#
#   healing.db tích lũy liên tục trên cùng 1 máy, không cần upload/download
#   artifact giữa các job. Model tự train khi DB đếm đủ 140 heal_success.
#
#   Job report chạy sau để đọc DB và publish summary lên GitHub Actions UI.
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB DUY NHẤT: chạy tất cả 5 module tuần tự trên 1 runner
  # Giống hệt: pytest test_login.py test_register.py test_products.py
  #                   test_admin.py test_contact.py
  # ════════════════════════════════════════════════════════════════
  run-all-tests:
    name: "Self-Healing Tests (login → register → products → admin → contact)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: myapp/package-lock.json
      - run: npm ci
        working-directory: myapp

      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: "6.0"

      - name: Start Backend server
        run: |
          npm install
          node server.js &
          timeout 30 bash -c 'until curl -sf http://localhost:5000 > /dev/null 2>&1; do sleep 2; done' || true
          echo "Backend ready!"

      - name: Start React dev server
        working-directory: myapp
        run: |
          npm run dev &
          timeout 60 bash -c 'until curl -sf http://localhost:5173 > /dev/null; do sleep 2; done'
          echo "React ready!"

      - name: Create output directories
        run: mkdir -p reports logs snapshots knowledge_base

      # ── Bước 1: login ─────────────────────────────────────────
      - name: "[1/5] Switch UI về v1 trước khi chạy test_login.py"
        run: bash myapp/src_mutated/switch_ui.sh v1
        env:
          SRC_DIR: myapp/src/pages

      - name: "[1/5] test_login.py (v1 snapshot → v2→v11 healing)"
        run: |
          pytest tests/test_login.py \
            -v --tb=short \
            --junit-xml=reports/junit-login.xml \
            --html=reports/report-login.html \
            --self-contained-html \
            2>&1 | tee logs/login.log
          echo "--- heal_count sau login ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ── Bước 2: register ──────────────────────────────────────
      - name: "[2/5] Switch UI về v1 trước khi chạy test_register.py"
        run: bash myapp/src_mutated/switch_ui.sh v1
        env:
          SRC_DIR: myapp/src/pages

      - name: "[2/5] test_register.py (v1 snapshot → v2→v11 healing)"
        run: |
          pytest tests/test_register.py \
            -v --tb=short \
            --junit-xml=reports/junit-register.xml \
            --html=reports/report-register.html \
            --self-contained-html \
            2>&1 | tee logs/register.log
          echo "--- heal_count sau register ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ── Bước 3: products ──────────────────────────────────────
      - name: "[3/5] Switch UI về v1 trước khi chạy test_products.py"
        run: bash myapp/src_mutated/switch_ui.sh v1
        env:
          SRC_DIR: myapp/src/pages

      - name: "[3/5] test_products.py (v1 snapshot → v2→v11 healing)"
        run: |
          pytest tests/test_products.py \
            -v --tb=short \
            --junit-xml=reports/junit-products.xml \
            --html=reports/report-products.html \
            --self-contained-html \
            2>&1 | tee logs/products.log
          echo "--- heal_count sau products ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ── Bước 4: admin ─────────────────────────────────────────
      - name: "[4/5] Switch UI về v1 trước khi chạy test_admin.py"
        run: bash myapp/src_mutated/switch_ui.sh v1
        env:
          SRC_DIR: myapp/src/pages

      - name: "[4/5] test_admin.py (v1 snapshot → v2→v11 healing)"
        run: |
          pytest tests/test_admin.py \
            -v --tb=short \
            --junit-xml=reports/junit-admin.xml \
            --html=reports/report-admin.html \
            --self-contained-html \
            2>&1 | tee logs/admin.log
          echo "--- heal_count sau admin ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ── Bước 5: contact ───────────────────────────────────────
      - name: "[5/5] Switch UI về v1 trước khi chạy test_contact.py"
        run: bash myapp/src_mutated/switch_ui.sh v1
        env:
          SRC_DIR: myapp/src/pages

      - name: "[5/5] test_contact.py (v1 snapshot → v2→v11 healing)"
        run: |
          pytest tests/test_contact.py \
            -v --tb=short \
            --junit-xml=reports/junit-contact.xml \
            --html=reports/report-contact.html \
            --self-contained-html \
            2>&1 | tee logs/contact.log
          echo "--- heal_count FINAL ---"
          python - <<'EOF'
          import sqlite3
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              total  = conn.execute("SELECT COUNT(*) FROM healing_events").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              print(f"  heal_success = {heal} / 140  |  models trained = {models}  |  total events = {total}")
              if models > 0:
                  row = conn.execute("SELECT w_attribute, w_semantic, w_structure, w_visual, w_context, accuracy FROM learned_weights ORDER BY id DESC LIMIT 1").fetchone()
                  print(f"  Trọng số mới nhất: attr={row[0]:.3f} sem={row[1]:.3f} struct={row[2]:.3f} vis={row[3]:.3f} ctx={row[4]:.3f} (acc={row[5]:.1%})")
              conn.close()
          except Exception as e:
              print(f"  (DB chưa có dữ liệu: {e})")
          EOF
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "true"
          PYTHONPATH: ${{ github.workspace }}
          SRC_DIR: myapp/src/pages

      # ── Upload artifacts ───────────────────────────────────────
      - name: Upload healing.db + knowledge_base
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healing-db-final
          path: |
            healing.db
            snapshots/
            knowledge_base/
          retention-days: 14

      - name: Upload test reports + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            logs/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════
  # JOB 2: Publish summary lên GitHub Actions UI
  # ════════════════════════════════════════════════════════════════
  report:
    name: "Publish Test Report"
    runs-on: ubuntu-latest
    needs: run-all-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download reports
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: reports/

      - name: Download healing.db
        uses: actions/download-artifact@v4
        with:
          name: healing-db-final
          path: .
        continue-on-error: true

      - name: Generate summary
        if: always()
        run: |
          python - <<'EOF'
          import os, sqlite3, glob, re

          summary = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')

          lines = []
          lines.append("## 🧪 Self-Healing Selenium Test Results\n")
          lines.append("### Luồng chạy: login → register → products → admin → contact\n")
          lines.append("_Toàn bộ 5 module chạy tuần tự trên 1 runner, switch về v1 trước mỗi module, healing.db tích lũy liên tục_\n\n")

          # Đọc DB stats
          try:
              conn = sqlite3.connect('healing.db')
              heal   = conn.execute("SELECT COUNT(*) FROM healing_events WHERE healing_success=1").fetchone()[0]
              total  = conn.execute("SELECT COUNT(*) FROM healing_events").fetchone()[0]
              models = conn.execute("SELECT COUNT(*) FROM learned_weights").fetchone()[0]
              conn.close()

              lines.append("### 📊 Healing Database (kết thúc pipeline)\n\n")
              lines.append("| Chỉ số | Giá trị |\n|--------|--------|\n")
              lines.append(f"| Tổng heal events | {total} |\n")
              lines.append(f"| heal_success tích lũy | **{heal}** |\n")
              lines.append(f"| Ngưỡng train lần đầu | 140 |\n")
              lines.append(f"| Số lần model đã train | {models} |\n")
              if models > 0:
                  lines.append(f"| Trạng thái model | ✅ Đã train, dùng LEARNED weights |\n")
              else:
                  lines.append(f"| Trạng thái model | ⏳ Còn thiếu {max(0, 140-heal)} heal_success |\n")
              lines.append("\n")
          except Exception as e:
              lines.append(f"_(Không đọc được healing.db: {e})_\n\n")

          # Kết quả từng module
          lines.append("### 📋 Kết quả từng module\n\n")
          lines.append("| Module | Tổng cases | Passed | Failed | Status |\n")
          lines.append("|--------|-----------|--------|--------|--------|\n")

          for module in ["login", "register", "products", "admin", "contact"]:
              xml_files = glob.glob(f"reports/junit-{module}.xml")
              if not xml_files:
                  lines.append(f"| {module} | — | — | — | ⚪ SKIP |\n")
                  continue
              content = open(xml_files[0]).read()
              tests    = re.search(r'tests="(\d+)"',    content)
              failures = re.search(r'failures="(\d+)"', content)
              errors   = re.search(r'errors="(\d+)"',   content)
              t = int(tests.group(1))    if tests    else 0
              f = int(failures.group(1)) if failures else 0
              e = int(errors.group(1))   if errors   else 0
              passed = t - f - e
              status = "✅ PASS" if (f + e) == 0 else f"❌ FAIL"
              lines.append(f"| {module} | {t} | {passed} | {f+e} | {status} |\n")

          with open(summary, 'a') as fp:
              fp.writelines(lines)

          print("Summary generated.")
          EOF

      - name: Upload combined reports
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports
          path: reports/
          retention-days: 14